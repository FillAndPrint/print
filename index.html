<title>Telugu Letter PDF Tool | It makes your work easy | simple way and low cost | officer letter format</title>

<style>
body{
  font-family:"Noto Sans Telugu","Gautami","Lohit Telugu","Nirmala UI",sans-serif;
  font-size:16px;
  margin:0;
  padding: 0;
  background-color: #f3f4f6;
}
h1{
  text-align:center;
  color: #1e3a8a;
  font-size: 24px;
  margin-top: 25px;
  margin-bottom: 25px;
}

/* ===== Navigation Header (Fixed) ===== */
.nav-header {
  background-color: #1e3a8a;
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  position: sticky;
  top: 0;
  z-index: 100;
}
.btn-nav-home {
  background-color: rgba(255, 255, 255, 0.15);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: bold;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.2s;
  margin: 0;
  flex-shrink: 0;
}
.btn-nav-home:hover {
  background-color: rgba(255, 255, 255, 0.25);
}
.nav-title {
  font-size: 16px;
  font-weight: bold;
  white-space: nowrap;
  margin: 0;
}

/* ===== Form Layout ===== */
#letterForm {
  max-width: 650px;
  margin: 0 auto 20px auto;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

label{display:block;font-weight:bold;margin-top:12px}
input,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:14px;
  border:2px solid #333;
  border-radius:4px;
  font-size:16px;
  box-sizing:border-box;
}
.readonly-box{
  background:#f3f3f3;
  border:2px dashed #666;
}

/* Fixed Global Button styling (Removed layout block properties) */
button{
  background:#2e7d32;
  color:#fff;
  padding:12px 28px;
  border:none;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
  border-radius:4px;
}

/* Specific layout styles for Download Button only */
#payBtn {
  display: block;
  margin: 25px auto;
}

/* ===== Promo Code Section ===== */
.promo-container {
  max-width: 100%;
  margin: 15px 0;
  padding: 12px;
  background: #f9f9f9;
  border: 1px solid #333;
  border-radius: 4px;
}
.promo-flex {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}
.promo-flex input {
  margin: 0;
  width: 70%;
  text-transform: uppercase;
}
.promo-flex button {
  margin: 0;
  width: 30%;
  background: #0275d8;
  padding: 10px;
  font-size: 16px;
}

/* ===== Preview ===== */
#letterPreview{
  display:none;
  width:210mm;
  height:297mm;
  padding:20mm;
  padding-bottom:32mm;
  box-sizing:border-box;
  background:#fff;
  color:#000;
  position:relative;
}

#letterPreview p{
  margin:0;
  line-height:1.55;
  text-align: justify; 
  text-justify: inter-word; 
  word-spacing: 1px;
}

.right{text-align:right !important}
.center{text-align:center !important}

/* Header */
.header p{ margin:1px 0; }

/* Heading */
#pHeading{
  text-align:center;
  margin:4px 0;
}

/* Address + Salutation */
.address p,
.salutation{
  text-indent:10mm;
  margin:2px 0;
}

.officer{
  font-size:18px;
  font-weight:bold;
}

/* ===== Subject ===== */
.subject{
  margin-top:1px !important;
  margin-bottom:1.5px !important;
  padding-left:27mm;
  text-indent:-17mm;
}

.subject .subject-text{
  font-size:15px;
  font-weight:500;
  background:#FCF9ED;
  padding:1px 4px;
  border-radius:2px;
}
/* Body */
.body-content p{
  text-indent:10mm;
  margin-bottom:8px;
}

/* ధన్యవాదాలు బోల్డ్ మరియు సెంటర్ అలైన్‌మెంట్ */
#pThankyou {
  text-align: center !important;
  font-weight: bold !important;
  margin-top: 15px;
  margin-bottom: 15px;
}

/* ముగింపు ఐడీకి నేరుగా స్టైల్స్ ఇచ్చి, ఎడమ వైపుకు జరపడం జరిగింది */
#pSignature {
  text-align: right !important;
  margin-right: 20mm !important;
  margin-top: 10px !important;
  display: block !important;
}

/* Footer */
.footer{
  position:absolute;
  bottom:15mm;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  text-align:center;
  width:100%;
}
.footer-line{
  width:80%;
  margin:0 auto 3px;
  border-top:1px solid #000;
}

</style>
</head>

<body>

<!-- Corrected HTML structure -->
<div class="nav-header">
  <button type="button" class="btn-nav-home" onclick="location.href='https://fillandprint.github.io/'">Home</button>
  <span class="nav-title">Telugu Letter Portal</span>
</div>

<h1>Letter to officer</h1>

<form id="letterForm">
  <label>తేదీ *</label>
  <input type="date" id="date">

  <label>సిటీ / ప్రాంతం</label>
  <input type="text" id="city" placeholder="గుంటూరు.">

  <label>హెడింగ్</label>
  <input type="text" id="heading" placeholder="వినతి పత్రం">

  <label>గౌరవనీయులు</label>
  <input type="text" id="respected" placeholder="శ్రీయుత గౌరవనీయులైన,">

  <label>హోదా</label>
  <input type="text" id="officer" placeholder="జిల్లా కలెక్టర్,">

  <label>కార్యాలయ సిటీ</label>
  <input type="text" id="officeCity" placeholder="గుంటూరు  జిల్లా">

  <label></label>
  <input type="text" value="గారికి," readonly class="readonly-box" id="gariki">

  <label>సంభోదన</label>
  <input type="text" id="salutation" placeholder="అయ్యా!">

  <label>విషయం</label>
  <input type="text" id="subject" placeholder="మంచినీటి సమస్య పరిష్కారం గురించి/గ్రంథాలయం ఏర్పాటు గురించి">

  <label>లేఖ వివరణ (కనిష్ఠం 250 పదాలు)</label>
  <textarea id="content" rows="14" placeholder="కొన్ని పదాలు Bold గా కావాలంటే వాటిని రెండు ** మధ్య రాయండి"></textarea>

  <label>ధన్యవాదాలు</label>
  <input type="text" id="thankyou" placeholder="కృతజ్ఞతలతో/ధన్యవాదాలు">

  <label>ముగింపు</label>
  <input type="text" id="signature" placeholder="మీ విధేయులు">

  <label>Footer (optional)</label>
  <input type="text" id="footerInput" placeholder="ఇక్కడ మీ షాప్ లేదా మీ పేరు లేదా ఫోన్ నెంబర్ ఇవ్వండి.">
  
  <div class="promo-container">
    <label>ప్రోమో కోడ్ (Promo Code):</label>
    <div class="promo-flex">
      <input type="text" id="promoCode" placeholder="NEW లేదా NEW10 అని టైప్ చేయండి">
      <button type="button" onclick="applyPromoCode()">Apply</button>
    </div>
    <span id="promoMessage" style="display:block; margin-top:5px; font-weight:bold;"></span>
  </div>

  <button type="button" onclick="startPayment()" id="payBtn">Pay & Download PDF</button>
</form>

<div id="letterPreview">
  <div class="header">
    <p class="right">తేదీ: <span id="pDate"></span>,</p>
    <p class="right" id="pCity"></p>
  </div>

  <h2 id="pHeading"></h2>

  <div class="address">
    <p id="pRespected"></p>
    <p id="pOfficer" class="officer"></p>
    <p id="pOfficeGariki"></p>
  </div>

  <p id="pSalutation" class="salutation"></p>

  <p class="subject">
    <strong>విషయం:</strong>
    <span id="pSubject" class="subject-text"></span>
  </p>

  <div id="pContent" class="body-content"></div>

  <p id="pThankyou"></p>
  <p id="pSignature"></p>

  <div class="footer">
    <div class="footer-line"></div>
    <span id="pFooter"></span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

const fields = ['date', 'city', 'heading', 'respected', 'officer', 'officeCity', 'salutation', 'subject', 'content', 'thankyou', 'signature', 'footerInput'];

let finalAmount = 29; 
let isPromoApplied = false;

window.addEventListener('DOMContentLoaded', () => {
  fields.forEach(fieldId => {
    const savedValue = localStorage.getItem(fieldId);
    if (savedValue) {
      document.getElementById(fieldId).value = savedValue;
    }
    
    document.getElementById(fieldId).addEventListener('input', (e) => {
      localStorage.setItem(fieldId, e.target.value);
    });
  });
  
  lockPastDates();
});

function lockPastDates(){
  const dateInput = document.getElementById("date");
  if(!dateInput) return;
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  const todayStr = `${yyyy}-${mm}-${dd}`;
  dateInput.setAttribute("min", todayStr);
}

function applyPromoCode() {
  const code = document.getElementById('promoCode').value.trim().toUpperCase();
  const msg = document.getElementById('promoMessage');
  const btn = document.getElementById('payBtn');
  
  if (code === 'NEW' || code === 'NEW10') {
    finalAmount = 0;
    isPromoApplied = true;
    msg.style.color = 'green';
    msg.innerText = '🎉 ప్రోమో కోడ్ అప్లై అయింది! మొదటి లేఖ ఉచితం.';
    btn.innerText = 'Download Free PDF';
  } else {
    finalAmount = 29;
    isPromoApplied = false;
    msg.style.color = 'red';
    msg.innerText = '❌ తప్పుడు ప్రోమో కోడ్.';
    btn.innerText = 'Pay & Download PDF';
  }
}

function startPayment() {
  if(!document.getElementById("date").value){
    alert("దయచేసి తేదీని ఎంచుకోండి.");
    return;
  }

  const contentVal = document.getElementById("content").value;
  const words = contentVal.trim().split(/\s+/).filter(Boolean);
  if(words.length > 250){
    alert("మీరు కనిష్ఠంగా 250 పదాలు మాత్రమే రాయగలరు. ప్రస్తుత పదాలు: " + words.length);
    return;
  }

  if (finalAmount === 0 && isPromoApplied) {
    generatePDF();
    return;
  }

  var options = {
    "key": "rzp_test_T12dgMJ5QxbrTh", 
    "amount": (finalAmount * 100).toString(), 
    "currency": "INR",
    "name": "Telugu Letter Tool",
    "description": "Letter PDF Generation Charge",
    "handler": function (response){
      alert("పేమెంట్ విజయవంతమైంది! మీ PDF డౌน์โหลด అవుతోంది...");
      generatePDF();
    },
    "theme": {
      "color": "#2e7d32"
    }
  };
  
  var rzp1 = new Razorpay(options);
  rzp1.open();
}

async function generatePDF(){
  const date = document.getElementById("date");
  const city = document.getElementById("city");
  const heading = document.getElementById("heading");
  const respected = document.getElementById("respected");
  const officer = document.getElementById("officer");
  const officeCity = document.getElementById("officeCity");
  const salutation = document.getElementById("salutation");
  const subject = document.getElementById("subject");
  const content = document.getElementById("content");
  const thankyou = document.getElementById("thankyou");
  const signature = document.getElementById("signature");
  const footerInput = document.getElementById("footerInput");

  let fileTitle = heading.value.trim();
  if(fileTitle === "") {
    fileTitle = "telugu_letter"; 
  }

  document.getElementById("pDate").textContent = date.value.split("-").reverse().join("-");
  document.getElementById("pCity").textContent = city.value;
  document.getElementById("pHeading").textContent = heading.value;
  document.getElementById("pRespected").textContent = respected.value;
  document.getElementById("pOfficer").textContent = officer.value;

  const officeFinal = officeCity.value || city.value;
  document.getElementById("pOfficeGariki").innerHTML = officeFinal + " <i>గారికి,</i>";

  document.getElementById("pSalutation").textContent = salutation.value;
  document.getElementById("pSubject").textContent = subject.value;
  document.getElementById("pThankyou").textContent = thankyou.value;
  document.getElementById("pSignature").textContent = signature.value;
  document.getElementById("pFooter").textContent = footerInput.value || "";

  const pContent = document.getElementById("pContent");
  pContent.innerHTML = "";
  content.value.split("\n").forEach(line => {
    if(!line.trim()) return;
    const p = document.createElement("p");
    p.innerHTML = line.replace(/\*(.*?)\*/g, "<strong>$1</strong>");
    pContent.appendChild(p);
  });

  const preview = document.getElementById("letterPreview");
  preview.style.display = "block";

  try{
    const canvas = await html2canvas(preview, {scale:2});
    const pdf = new jsPDF({
      orientation: "p",
      unit: "mm",
      format: "a4"
    });
    pdf.addImage(canvas, "PNG", 0, 0, 210, 297);
    pdf.save(fileTitle + ".pdf");
  }catch(e){
    alert("PDF జనరేషన్ విఫలమైంది. మళ్లీ ప్రయత్నించండి.");
    console.error(e);
  }finally{
    preview.style.display = "none";
  }
}
</script>

</body>
</html>
